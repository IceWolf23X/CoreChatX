name: ChatBloom
description: ${project.description}
prefix: ChatBloom
version: ${project.version}
main: icewolf23x.chatBloom.ChatBloom
api-version: '1.21.11'
load: POSTWORLD
authors: [ IceWolf23X ]
softdepend: [ PlaceholderAPI, LuckPerms ]

commands:
  chatbloom:
    description: Main ChatBloom command.
    aliases: [ cbloom ]
    usage: /chatbloom <reload|item>
  msg:
    description: Send a private message.
    aliases: [ tell, whisper, w ]
    usage: /msg <player> <message>
  reply:
    description: Reply to your last private conversation.
    aliases: [ r ]
    usage: /reply <message>
  socialspy:
    description: Toggle private message spy mode.
    aliases: [ spy ]
    usage: /socialspy
  broadcast:
    description: Send a formatted staff broadcast.
    aliases: [ bc ]
    usage: /broadcast <message>
  ping:
    description: Manage ping notification preferences.
    usage: /ping <sound|actionbar> [on|off|toggle|status]

permissions:
  chatbloom.command.chatbloom:
    description: Access to the root ChatBloom command.
    default: op
  chatbloom.command.reload:
    description: Reload ChatBloom configuration files.
    default: op
  chatbloom.command.msg:
    description: Send private messages.
    default: op
  chatbloom.command.reply:
    description: Reply to private messages.
    default: op
  chatbloom.command.socialspy:
    description: Toggle persistent PM spy mode.
    default: op
  chatbloom.command.broadcast:
    description: Send global staff broadcasts.
    default: op
  chatbloom.command.ping:
    description: Change ping notification preferences.
    default: op
  chatbloom.cooldown.bypass.public:
    description: Bypass the public chat cooldown.
    default: op
  chatbloom.cooldown.bypass.pm:
    description: Bypass the private message cooldown.
    default: op
  chatbloom.staff:
    description: Example shared staff permission used by default custom ping configuration.
    default: op
  chatbloom.chatitem.item:
    description: Use [item] and [i] chat item tokens.
    default: op
  chatbloom.chatitem.shulker:
    description: Allow [item] to upgrade to a shulker preview when holding a shulker box.
    default: op
  chatbloom.chatitem.armor:
    description: Use [armor] chat item tokens.
    default: op
  chatbloom.chatitem.hotbar:
    description: Use [hotbar] chat item tokens.
    default: op
  chatbloom.chatitem.inventory:
    description: Use [inventory] and [inv] chat item tokens.
    default: op
  chatbloom.chatitem.enderchest:
    description: Use [enderchest], [ender], and [ec] chat item tokens.
    default: op
  chatbloom.format.color.black:
    description: Use the legacy color code &0 in player-authored messages.
    default: op
  chatbloom.format.color.dark_blue:
    description: Use the legacy color code &1 in player-authored messages.
    default: op
  chatbloom.format.color.dark_green:
