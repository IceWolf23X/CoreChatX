# Core plugin settings.

deployment:
  # STANDALONE = Paper-only local mode
  # PROXY = optional proxy-aware mode, requires full restart after changes
  mode: "STANDALONE"
  # Also accepted as deployment.require-restart-on-mode-change for spec compatibility.
  require-full-restart-on-mode-change: true
  # Backend id used for proxy routing and bridge source labels.
  server-id: "paper-1"
  # Plugin messaging channel shared with the Velocity module.
  network-channel: "chatbloom:main"
  # Global switch for Discord / Telegram exports.
  bridges-allowed: true
  # When false, Paper still boots in PROXY mode but cross-server chat / PM features stay disabled.
  network-features-allowed: false
  # Flat alias accepted in addition to deployment.proxy.pending-pm-timeout-seconds.
  pending-pm-timeout-seconds: 20
  proxy:
    # Must match the backend server name known by Velocity when mode = PROXY.
    server-id: "paper-1"
    # Remote PM requests expire locally after this many seconds if no proxy result returns.
    pending-pm-timeout-seconds: 20

debug: false

hooks:
  # If true, PlaceholderAPI placeholders inside ChatBloom config formats are parsed when the plugin is present.
  placeholderapi: true
  # If true, LuckPerms group prefixes are read when the plugin is present.
  luckperms: true

logging:
  public-chat: true
  private-messages: true
  broadcasts: true
  reload: true
  errors: true

player-data:
  # Toggle commands still save immediately; this mainly controls the fallback save on plugin disable.
  auto-save-on-disable: true

first-join:
  enabled: true
  counter-enabled: true

join-quit:
  join-enabled: true
  quit-enabled: true

reload:
  # A short summary is shown to the command sender after a successful reload.
  show-summary: true
