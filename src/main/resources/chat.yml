# Public chat formatting and moderation settings.

public-chat:
  enabled: true
  # Supported placeholders inside the format:
  # {plugin_prefix}, {rank_prefix}, {player_name}, {message}
  # Layout inspired by the older NetworkChat proxy format:
  # prefix + player name + italic separator + processed message.
  # ChatBloom keeps its own default palette instead of copying the old colors verbatim.
  format: "{plugin_prefix} {rank_prefix}<white>{player_name}</white><dark_gray><italic>» </italic></dark_gray>{message}"
  plugin-prefix: "<dark_gray>[</dark_gray><gradient:#79d6b8:#5aa9ff>Chat</gradient><dark_gray>]</dark_gray>"
  fallback-rank-prefix: ""

mentions:
  enabled: true
  # Mention matching accepts both Steve and @Steve when the token matches an online player exactly.
  # If disabled, names are left as normal text and no mention notification logic runs.
  token-format: "<#79d6b8>@{player_name}</#79d6b8>"

cooldowns:
  public:
    enabled: true
    seconds: 2
  private-messages:
    enabled: false
    seconds: 2
